<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Login — SNATCHED" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}?v=4">
</head>
<body class="auth-page-body">
    <div class="auth-container">
        <a href="/" class="auth-brand">
            <span class="material-symbols-outlined">heart_broken</span>
            <span class="auth-brand-text">SNATCHED</span>
        </a>

        <div class="auth-card">
            <h2>Sign In</h2>

            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" autofocus>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">

                <button type="submit" class="auth-submit">LOG IN</button>
            </form>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one</a>
        </div>

        <p class="auth-tagline">They took your memories. We take them back.</p>
    </div>
</body>
</html>
